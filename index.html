<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savitri Electronics | Finance Pro</title>
    
    <style>
        /* iOS Theme Variables */
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-orange: #FF9500;
            --ios-green: #34C759;
            --ios-text-main: #000000;
            --ios-text-muted: #8E8E93;
            --ios-input-bg: #7676801F;
            --ios-border: #C6C6C8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* PIN Lock Screen */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ios-bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .lock-box {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 80%; max-width: 300px;
        }
        .lock-box h2 { margin-top: 0; color: var(--ios-blue); }
        .lock-box input {
            width: 100%; padding: 12px; margin: 15px 0; border: 1px solid var(--ios-border);
            border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box;
        }

        /* Main App Wrapper (Hidden by default) */
        #mainApp { display: none; }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            position: sticky; top: 0; padding: 16px 20px; text-align: center;
            border-bottom: 0.5px solid var(--ios-border); z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar-title h2 { margin: 0; font-size: 17px; font-weight: 600; }
        .navbar-title p { margin: 2px 0 0; font-size: 12px; color: var(--ios-text-muted); }
        .btn-icon { background: none; border: none; color: var(--ios-blue); font-size: 20px; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; margin-left: 16px; margin-right: 5px; }
        .section-title { font-size: 13px; text-transform: uppercase; color: var(--ios-text-muted); font-weight: 500; margin: 0;}
        
        .card { background: var(--ios-card); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }

        .input-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--ios-border); }
        .input-row:last-child { border-bottom: none; }
        .input-row label { width: 100px; font-size: 15px; font-weight: 500; }
        .input-row input { flex: 1; border: none; background: transparent; font-size: 15px; outline: none; }
        
        .btn-primary { width: 100%; background-color: var(--ios-blue); color: white; border: none; padding: 16px; font-size: 17px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.1s; }
        .btn-primary:active { transform: scale(0.97); }

        .btn-export { background: var(--ios-green); color: white; border: none; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .search-container { background: var(--ios-input-bg); border-radius: 10px; padding: 8px 12px; margin-bottom: 15px; display: flex; align-items: center; }
        .search-container input { border: none; background: transparent; width: 100%; font-size: 15px; outline: none; }

        .record-item { padding: 16px; border-bottom: 0.5px solid var(--ios-border); }
        .record-item:last-child { border-bottom: none; }
        .product-title { font-size: 17px; font-weight: 600; }
        .data-row { display: flex; justify-content: space-between; font-size: 15px; margin-top: 4px; }
        .sr-highlight { color: var(--ios-blue); font-weight: 600; }
        .timestamp { font-size: 11px; color: var(--ios-text-muted); margin-top: 6px; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-edit { flex: 1; background: #fff0e0; color: var(--ios-orange); border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-destructive { flex: 1; background: #ffebe9; color: var(--ios-red); border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .badge { background: var(--ios-blue); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .loading-text { text-align: center; padding: 20px; color: var(--ios-text-muted); font-size: 15px; }
    </style>
</head>
<body>

    <!-- Security Lock Screen -->
    <div id="lockScreen">
        <div class="lock-box">
            <h2>🔒 Security Lock</h2>
            <p style="font-size: 14px; color: gray;">Enter PIN to access database</p>
            <input type="password" id="pinInput" placeholder="Enter PIN (Default: 1234)">
            <button class="btn-primary" onclick="verifyPin()">Unlock</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <div class="navbar">
            <div class="navbar-title">
                <h2>Savitri Electronics</h2>
                <p>Pro Finance Manager</p>
            </div>
            <button class="btn-icon" onclick="changePin()" title="Change PIN">⚙️</button>
        </div>

        <div class="container">
            <!-- Form Section -->
            <div class="section-title">Product Entry</div>
            <div class="card" style="margin-top: 8px;">
                <input type="hidden" id="editId" value="">
                <div class="input-row">
                    <label>Product</label>
                    <input type="text" id="productName" placeholder="e.g. LED TV 43 inch">
                </div>
                <div class="input-row">
                    <label>SR No.</label>
                    <input type="text" id="srNumber" placeholder="Enter SR number">
                </div>
                <div class="input-row">
                    <label>Serial No.</label>
                    <input type="text" id="serialNumber" placeholder="Enter product serial">
                </div>
            </div>
            <button class="btn-primary" id="saveBtn">Save Record</button>

            <br><br>

            <!-- Inventory Section -->
            <div class="section-header">
                <div class="section-title">Available Stock <span class="badge" id="totalCount">0</span></div>
                <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
            </div>
            
            <div class="search-container">
                <span>🔍 </span>
                <input type="search" id="searchInput" placeholder="Search by Model or SR..." onkeyup="filterRecords()">
            </div>

            <div class="card" id="recordsList">
                <div class="loading-text">Connecting to secure database...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy, setDoc, getDoc } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3hc6Rz1gHZq8c71AHp5NSw8eSZT2-Mik",
            authDomain: "savitri-job-bridge.firebaseapp.com",
            projectId: "savitri-job-bridge",
            storageBucket: "savitri-job-bridge.firebasestorage.app",
            messagingSenderId: "721066136910",
            appId: "1:721066136910:web:61b5d58b31d8ab481f7a1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // GLOBAL VARIABLES
        let globalRecords = [];
        let systemPin = "1234"; 

        // SECURITY PIN LOGIC
        const pinRef = doc(db, "app_settings", "security");
        
        async function fetchPin() {
            const docSnap = await getDoc(pinRef);
            if (docSnap.exists()) {
                systemPin = docSnap.data().pin;
            } else {
                await setDoc(pinRef, { pin: "1234" });
            }
        }
        fetchPin();

        window.verifyPin = function() {
            const entered = document.getElementById('pinInput').value;
            if(entered === systemPin) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else {
                alert("❌ Incorrect PIN. Please try again.");
                document.getElementById('pinInput').value = '';
            }
        };

        window.changePin = async function() {
            const oldPin = prompt("Enter Current PIN:");
            if(oldPin === systemPin) {
                const newPin = prompt("Enter NEW 4-digit PIN:");
                if(newPin && newPin.length >= 4) {
                    await setDoc(pinRef, { pin: newPin });
                    systemPin = newPin;
                    alert("✅ PIN changed successfully! It will update on all devices.");
                } else {
                    alert("PIN must be at least 4 digits.");
                }
            } else if (oldPin != null) {
                alert("❌ Current PIN is wrong.");
            }
        };

        // SAVE & EDIT FUNCTION
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const product = document.getElementById('productName').value.trim().toUpperCase();
            const sr = document.getElementById('srNumber').value.trim().toUpperCase();
            const serial = document.getElementById('serialNumber').value.trim().toUpperCase();
            const editId = document.getElementById('editId').value;

            if (!product || !sr || !serial) {
                alert("⚠️ Please fill all details!"); return;
            }

            // DUPLICATE SR CHECK (Local array se instant check)
            const isDuplicate = globalRecords.find(item => item.sr === sr && item.id !== editId);
            if (isDuplicate) {
                alert(`❌ ERROR: SR Number '${sr}' pehle se save hai! Kripya check karein.`);
                return;
            }

            if (editId) {
                // UPDATE OLD RECORD
                await updateDoc(doc(db, "finance_records", editId), { product, sr, serial });
                document.getElementById('saveBtn').innerText = "Save Record";
                document.getElementById('saveBtn').style.backgroundColor = "var(--ios-blue)";
                document.getElementById('editId').value = '';
                alert("✅ Record Updated!");
            } else {
                // ADD NEW RECORD
                const newData = { product, sr, serial, timestamp: Date.now() };
                addDoc(collection(db, "finance_records"), newData);
            }

            // Clear UI
            document.getElementById('productName').value = '';
            document.getElementById('srNumber').value = '';
            document.getElementById('serialNumber').value = '';
        });

        // EDIT BUTTON LOGIC
        window.editRecord = function(id, product, sr, serial) {
            document.getElementById('productName').value = product;
            document.getElementById('srNumber').value = sr;
            document.getElementById('serialNumber').value = serial;
            document.getElementById('editId').value = id;
            
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Update Record";
            btn.style.backgroundColor = "var(--ios-orange)";
            window.scrollTo(0, 0);
        };

        // DELETE FUNCTION
        window.deleteRecord = function(id) {
            if (confirm("Mark as Used/Sold? This will remove the record.")) {
                deleteDoc(doc(db, "finance_records", id));
            }
        };

        // EXPORT TO EXCEL (CSV)
        window.exportExcel = function() {
            if(globalRecords.length === 0) { alert("No data to export!"); return; }
            
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Date Added,Product Name,SR Number,Serial Number\n"; // Header
            
            globalRecords.forEach(row => {
                let dateStr = new Date(row.timestamp).toLocaleDateString('en-IN');
                csvContent += `"${dateStr}","${row.product}","${row.sr}","${row.serial}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Savitri_Stock_${new Date().toLocaleDateString('en-IN')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // REAL-TIME SYNC
        const q = query(collection(db, "finance_records"), orderBy("timestamp", "desc"));
        onSnapshot(q, (querySnapshot) => {
            const list = document.getElementById('recordsList');
            document.getElementById('totalCount').innerText = querySnapshot.size;
            list.innerHTML = '';
            globalRecords = []; // Reset local array
            
            if (querySnapshot.empty) {
                list.innerHTML = '<div class="loading-text">No fresh records found.</div>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                data.id = docSnap.id;
                globalRecords.push(data); // Save to local array for duplicate check & export

                // Format Date
                let timeString = new Date(data.timestamp).toLocaleString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                list.innerHTML += `
                    <div class="record-item record-card">
                        <div class="product-title">${data.product}</div>
                        <div class="data-row">
                            <span>SR: <span class="sr-highlight">${data.sr}</span></span>
                            <span>S/N: ${data.serial}</span>
                        </div>
                        <div class="timestamp">⏳ Added: ${timeString}</div>
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="editRecord('${data.id}', '${data.product}', '${data.sr}', '${data.serial}')">✏️ Edit</button>
                            <button class="btn-destructive" onclick="deleteRecord('${data.id}')">🗑️ Use</button>
                        </div>
                    </div>
                `;
            });
        });

        // SEARCH
        window.filterRecords = function() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('record-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
