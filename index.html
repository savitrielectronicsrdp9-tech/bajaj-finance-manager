<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savitri Electronics | Finance Pro</title>
    
    <!-- AI Text Recognition Library -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <!-- Cropper.js Library (For Crop & Rotate) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        :root {
            --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --ios-blue: #007AFF; --ios-red: #FF3B30;
            --ios-orange: #FF9500; --ios-green: #34C759; --ios-text-main: #000000;
            --ios-text-muted: #8E8E93; --ios-input-bg: #7676801F; --ios-border: #C6C6C8;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background-color: var(--ios-bg); color: var(--ios-text-main); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        /* Lock Screen */
        #lockScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ios-bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 80%; max-width: 300px; }
        .lock-box h2 { margin-top: 0; color: var(--ios-blue); }
        .lock-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid var(--ios-border); border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box; }

        #mainApp { display: none; }

        /* Navbar */
        .navbar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; padding: 16px 20px; text-align: center; border-bottom: 0.5px solid var(--ios-border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .navbar-title h2 { margin: 0; font-size: 17px; font-weight: 600; }
        .navbar-title p { margin: 2px 0 0; font-size: 12px; color: var(--ios-text-muted); }
        .btn-icon { background: none; border: none; color: var(--ios-blue); font-size: 20px; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; margin-left: 16px; margin-right: 5px; }
        .section-title { font-size: 13px; text-transform: uppercase; color: var(--ios-text-muted); font-weight: 500; margin: 0;}
        .card { background: var(--ios-card); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }

        .input-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--ios-border); }
        .input-row:last-child { border-bottom: none; }
        .input-row label { width: 90px; font-size: 15px; font-weight: 500; }
        .input-wrapper { display: flex; flex: 1; align-items: center; }
        .input-wrapper input, .input-wrapper select { flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 4px 0; color: var(--ios-text-main); width: 100%; }
        
        .btn-add-cat { background: var(--ios-blue); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 18px; line-height: 1; cursor: pointer; margin-left: 10px; display: flex; justify-content: center; align-items: center; }
        .btn-scan { background: #e5e5ea; color: var(--ios-blue); border: none; border-radius: 8px; padding: 6px 10px; font-size: 18px; cursor: pointer; margin-left: 8px; transition: 0.1s;}
        .btn-scan:active { background: #d1d1d6; }
        .btn-primary { width: 100%; background-color: var(--ios-blue); color: white; border: none; padding: 16px; font-size: 17px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.1s; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-export { background: var(--ios-green); color: white; border: none; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .search-container { background: var(--ios-input-bg); border-radius: 10px; padding: 8px 12px; margin-bottom: 15px; display: flex; align-items: center; }
        .search-container input { border: none; background: transparent; width: 100%; font-size: 15px; outline: none; }

        .record-item { padding: 16px; border-bottom: 0.5px solid var(--ios-border); }
        .record-item:last-child { border-bottom: none; }
        .product-title { font-size: 17px; font-weight: 600; color: var(--ios-blue); margin-bottom: 4px; }
        .data-row { display: flex; justify-content: space-between; font-size: 14px; margin-top: 4px; }
        .timestamp { font-size: 11px; color: var(--ios-text-muted); margin-top: 6px; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-edit { flex: 1; background: #fff0e0; color: var(--ios-orange); border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-destructive { flex: 1; background: #ffebe9; color: var(--ios-red); border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .badge { background: var(--ios-blue); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .loading-text { text-align: center; padding: 20px; color: var(--ios-text-muted); font-size: 15px; }

        /* AI Loading Screen */
        #ocrLoading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Cropper UI */
        #cropperModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10001; flex-direction: column; }
        .cropper-area { flex: 1; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .cropper-area img { max-width: 100%; max-height: 100%; }
        .cropper-controls { padding: 15px 20px 30px; background: #1c1c1e; display: flex; flex-direction: column; gap: 15px; }
        .cropper-tools { display: flex; justify-content: center; gap: 20px; }
        .btn-tool { background: #2c2c2e; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .cropper-actions { display: flex; gap: 10px; }
        .btn-cancel { flex: 1; background: #3a3a3c; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; }
        .btn-done { flex: 2; background: var(--ios-blue); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <!-- Camera File Input -->
    <input type="file" accept="image/*" capture="environment" id="cameraInput" style="display: none;">

    <!-- Cropper UI Modal -->
    <div id="cropperModal">
        <div class="cropper-area">
            <img id="imageToCrop" src="">
        </div>
        <div class="cropper-controls">
            <div class="cropper-tools">
                <button class="btn-tool" onclick="rotateImage(-90)">↺ Left</button>
                <button class="btn-tool" onclick="rotateImage(90)">↻ Right</button>
            </div>
            <div class="cropper-actions">
                <button class="btn-cancel" onclick="cancelCrop()">Cancel</button>
                <button class="btn-done" onclick="readCroppedImage()">Crop & Read</button>
            </div>
        </div>
    </div>

    <!-- AI Loading Screen -->
    <div id="ocrLoading">
        <div class="spinner"></div>
        <h3>Reading Number...</h3>
        <p style="font-size: 13px; color: #ccc;">Extracting text from image</p>
    </div>

    <!-- Security Lock Screen -->
    <div id="lockScreen">
        <div class="lock-box">
            <h2>🔒 Security Lock</h2>
            <p style="font-size: 14px; color: gray;">Enter PIN to access database</p>
            <input type="password" id="pinInput" placeholder="Enter PIN (Default: 1234)">
            <button class="btn-primary" onclick="verifyPin()">Unlock</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <div class="navbar">
            <div class="navbar-title">
                <h2>Savitri Electronics</h2>
                <p>Pro Finance Manager</p>
            </div>
            <button class="btn-icon" onclick="changePin()" title="Change PIN">⚙️</button>
        </div>

        <div class="container">
            <div class="section-title">Product Entry</div>
            <div class="card" style="margin-top: 8px;">
                <input type="hidden" id="editId" value="">
                
                <div class="input-row">
                    <label>Brand</label>
                    <div class="input-wrapper">
                        <select id="categorySelect">
                            <option value="" disabled selected>Select Company...</option>
                        </select>
                        <button class="btn-add-cat" onclick="addNewCategory()">+</button>
                    </div>
                </div>

                <div class="input-row">
                    <label>Model</label>
                    <div class="input-wrapper">
                        <input type="text" id="modelNumber" placeholder="e.g. 43 Inch Smart LED">
                    </div>
                </div>

                <div class="input-row">
                    <label>SR No.</label>
                    <div class="input-wrapper">
                        <input type="text" id="srNumber" placeholder="Enter SR number">
                        <button class="btn-scan" onclick="startTextScanner('srNumber')" title="Take Photo">📷</button>
                    </div>
                </div>
                <div class="input-row">
                    <label>Serial No.</label>
                    <div class="input-wrapper">
                        <input type="text" id="serialNumber" placeholder="Enter product serial">
                        <button class="btn-scan" onclick="startTextScanner('serialNumber')" title="Take Photo">📷</button>
                    </div>
                </div>
            </div>
            <button class="btn-primary" id="saveBtn">Save Record</button>

            <br><br>

            <div class="section-header">
                <div class="section-title">Available Stock <span class="badge" id="totalCount">0</span></div>
                <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
            </div>
            
            <div class="search-container">
                <span>🔍 </span>
                <input type="search" id="searchInput" placeholder="Search by Brand, Model or SR..." onkeyup="filterRecords()">
            </div>

            <div class="card" id="recordsList">
                <div class="loading-text">Connecting to secure database...</div>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy, setDoc, getDoc } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3hc6Rz1gHZq8c71AHp5NSw8eSZT2-Mik",
            authDomain: "savitri-job-bridge.firebaseapp.com",
            projectId: "savitri-job-bridge",
            storageBucket: "savitri-job-bridge.firebasestorage.app",
            messagingSenderId: "721066136910",
            appId: "1:721066136910:web:61b5d58b31d8ab481f7a1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalRecords = [];
        let systemPin = "1234"; 
        let brandCategories = ["LG", "WHIRLPOOL", "VOLTAS", "GODREJ", "BAJAJ", "SAMSUNG", "SONY", "HAVELLS"];

        // ================= CROPPER & AI TEXT SCANNER =================
        let activeInputId = "";
        const cameraInput = document.getElementById('cameraInput');
        let cropperInstance = null;

        window.startTextScanner = function(inputId) {
            activeInputId = inputId;
            cameraInput.click();
        };

        cameraInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const image = document.getElementById('imageToCrop');
                image.src = event.target.result;
                
                document.getElementById('cropperModal').style.display = 'flex';
                
                if (cropperInstance) cropperInstance.destroy();
                
                cropperInstance = new Cropper(image, {
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 0.6,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    cropBoxMovable: true,
                    cropBoxResizable: true,
                    toggleDragModeOnDblclick: false,
                });
            };
            reader.readAsDataURL(file);
        });

        window.rotateImage = function(degree) {
            if (cropperInstance) cropperInstance.rotate(degree);
        };

        window.cancelCrop = function() {
            document.getElementById('cropperModal').style.display = 'none';
            if (cropperInstance) cropperInstance.destroy();
            cameraInput.value = "";
        };

        window.readCroppedImage = function() {
            if (!cropperInstance) return;
            
            // Get cropped image as base64 data
            const canvas = cropperInstance.getCroppedCanvas();
            const dataUrl = canvas.toDataURL('image/jpeg');

            // Close cropper, show loading
            document.getElementById('cropperModal').style.display = 'none';
            document.getElementById('ocrLoading').style.display = 'flex';

            // Send to AI
            Tesseract.recognize(dataUrl, 'eng')
            .then(({ data: { text } }) => {
                document.getElementById('ocrLoading').style.display = 'none';
                
                // Clean the extracted text
                let cleanText = text.replace(/\s+/g, '').replace(/[^a-zA-Z0-9-]/g, '').trim();
                
                if(cleanText) {
                    document.getElementById(activeInputId).value = cleanText;
                } else {
                    alert("⚠️ Number saaf nahi padha gaya. Kripya dhyan se crop karein.");
                }
                cameraInput.value = ""; 
                cropperInstance.destroy();
            }).catch(err => {
                document.getElementById('ocrLoading').style.display = 'none';
                alert("❌ Error reading text. Kripya dobara try karein.");
                cameraInput.value = "";
                cropperInstance.destroy();
            });
        };

        // ================= SECURITY PIN =================
        const pinRef = doc(db, "app_settings", "security");
        async function fetchPin() {
            const docSnap = await getDoc(pinRef);
            if (docSnap.exists()) systemPin = docSnap.data().pin;
            else await setDoc(pinRef, { pin: "1234" });
        }
        fetchPin();

        window.verifyPin = function() {
            if(document.getElementById('pinInput').value === systemPin) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            } else { alert("❌ Incorrect PIN."); document.getElementById('pinInput').value = ''; }
        };

        window.changePin = async function() {
            if(prompt("Enter Current PIN:") === systemPin) {
                const newPin = prompt("Enter NEW 4-digit PIN:");
                if(newPin && newPin.length >= 4) {
                    await setDoc(pinRef, { pin: newPin });
                    systemPin = newPin; alert("✅ PIN Changed!");
                } else alert("PIN must be at least 4 digits.");
            } else alert("❌ Wrong PIN.");
        };

        // ================= BRAND SYSTEM =================
        const catRef = doc(db, "app_settings", "brands");
        onSnapshot(catRef, (docSnap) => {
            if (docSnap.exists() && docSnap.data().list) brandCategories = docSnap.data().list;
            else setDoc(catRef, { list: brandCategories });
            renderCategories();
        });

        function renderCategories() {
            const select = document.getElementById("categorySelect");
            const currentVal = select.value;
            select.innerHTML = '<option value="" disabled selected>Select Company...</option>';
            brandCategories.sort().forEach(brand => {
                const opt = document.createElement("option"); opt.value = brand; opt.innerText = brand; select.appendChild(opt);
            });
            if(currentVal && brandCategories.includes(currentVal)) select.value = currentVal;
        }

        window.addNewCategory = async function() {
            const newBrand = prompt("Enter new Company/Brand name:");
            if (newBrand && newBrand.trim() !== "") {
                const cleanBrand = newBrand.trim().toUpperCase();
                if(!brandCategories.includes(cleanBrand)) {
                    brandCategories.push(cleanBrand);
                    await setDoc(catRef, { list: brandCategories });
                    document.getElementById("categorySelect").value = cleanBrand;
                } else alert("This brand already exists.");
            }
        };

        // ================= SAVE & EDIT =================
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const category = document.getElementById('categorySelect').value;
            const model = document.getElementById('modelNumber').value.trim().toUpperCase();
            const sr = document.getElementById('srNumber').value.trim().toUpperCase();
            const serial = document.getElementById('serialNumber').value.trim().toUpperCase();
            const editId = document.getElementById('editId').value;

            if (!category || !model || !sr || !serial) { alert("⚠️ Please fill all fields!"); return; }

            const isDuplicate = globalRecords.find(item => item.sr === sr && item.id !== editId);
            if (isDuplicate) { alert(`❌ ERROR: SR Number '${sr}' already exists!`); return; }

            if (editId) {
                await updateDoc(doc(db, "finance_records", editId), { category, model, sr, serial });
                document.getElementById('saveBtn').innerText = "Save Record";
                document.getElementById('saveBtn').style.backgroundColor = "var(--ios-blue)";
                document.getElementById('editId').value = '';
            } else { addDoc(collection(db, "finance_records"), { category, model, sr, serial, timestamp: Date.now() }); }

            document.getElementById('categorySelect').value = ''; document.getElementById('modelNumber').value = '';
            document.getElementById('srNumber').value = ''; document.getElementById('serialNumber').value = '';
        });

        window.editRecord = function(id, category, model, sr, serial, oldProduct) {
            if(!category) { document.getElementById('modelNumber').value = oldProduct || ''; document.getElementById('categorySelect').value = ''; } 
            else { document.getElementById('categorySelect').value = category; document.getElementById('modelNumber').value = model; }
            document.getElementById('srNumber').value = sr; document.getElementById('serialNumber').value = serial;
            document.getElementById('editId').value = id;
            const btn = document.getElementById('saveBtn'); btn.innerText = "Update Record"; btn.style.backgroundColor = "var(--ios-orange)"; window.scrollTo(0, 0);
        };

        window.deleteRecord = function(id) { if (confirm("Mark as Used/Sold?")) deleteDoc(doc(db, "finance_records", id)); };

        // ================= REAL-TIME SYNC =================
        const q = query(collection(db, "finance_records"), orderBy("timestamp", "desc"));
        onSnapshot(q, (querySnapshot) => {
            const list = document.getElementById('recordsList');
            document.getElementById('totalCount').innerText = querySnapshot.size;
            list.innerHTML = ''; globalRecords = []; 
            if (querySnapshot.empty) { list.innerHTML = '<div class="loading-text">No fresh records found.</div>'; return; }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data(); data.id = docSnap.id; globalRecords.push(data); 
                let displayName = data.category ? `${data.category} - ${data.model}` : data.product;
                let timeString = new Date(data.timestamp).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                list.innerHTML += `
                    <div class="record-item record-card">
                        <div class="product-title">${displayName}</div>
                        <div class="data-row"><span>SR: <strong>${data.sr}</strong></span><span>S/N: <strong>${data.serial}</strong></span></div>
                        <div class="timestamp">⏳ Added: ${timeString}</div>
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="editRecord('${data.id}', '${data.category || ''}', '${data.model || ''}', '${data.sr}', '${data.serial}', '${data.product || ''}')">✏️ Edit</button>
                            <button class="btn-destructive" onclick="deleteRecord('${data.id}')">🗑️ Use</button>
                        </div>
                    </div>`;
            });
        });

        window.exportExcel = function() {
            if(globalRecords.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Date,Brand,Model Name,SR Number,Serial Number\n"; 
            globalRecords.forEach(row => {
                let dateStr = new Date(row.timestamp).toLocaleDateString('en-IN');
                csvContent += `"${dateStr}","${row.category || "N/A"}","${row.model || row.product || "N/A"}","${row.sr}","${row.serial}"\n`;
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `Savitri_Stock_${new Date().toLocaleDateString('en-IN')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        window.filterRecords = function() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('record-card');
            for (let i = 0; i < cards.length; i++) cards[i].style.display = cards[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    </script>
</body>
</html>
