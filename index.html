<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savitri Electronics | Pro Admin</title>
    
    <style>
        :root {
            --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --ios-blue: #007AFF; --ios-red: #FF3B30;
            --ios-orange: #FF9500; --ios-green: #34C759; --ios-text-main: #000000;
            --ios-text-muted: #8E8E93; --ios-input-bg: #7676801F; --ios-border: #C6C6C8;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background-color: var(--ios-bg); color: var(--ios-text-main); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        /* Secure Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ios-bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 320px; }
        .login-box h2 { margin-top: 0; color: var(--ios-blue); font-size: 22px; }
        .login-box p { font-size: 13px; color: var(--ios-text-muted); margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--ios-border); border-radius: 10px; font-size: 16px; box-sizing: border-box; background: var(--ios-input-bg); outline: none; }
        
        #mainApp { display: none; }

        /* Navbar */
        .navbar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; padding: 16px 20px; text-align: center; border-bottom: 0.5px solid var(--ios-border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .navbar-title h2 { margin: 0; font-size: 17px; font-weight: 600; }
        .navbar-title p { margin: 2px 0 0; font-size: 12px; color: var(--ios-text-muted); }
        .btn-icon { background: none; border: none; color: var(--ios-red); font-size: 20px; cursor: pointer; } /* Logout icon */

        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; margin-left: 16px; margin-right: 5px; }
        .section-title { font-size: 13px; text-transform: uppercase; color: var(--ios-text-muted); font-weight: 500; margin: 0;}
        .card { background: var(--ios-card); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }

        .input-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--ios-border); }
        .input-row:last-child { border-bottom: none; }
        .input-row label { width: 90px; font-size: 15px; font-weight: 500; }
        .input-wrapper { display: flex; flex: 1; align-items: center; }
        .input-wrapper input, .input-wrapper select { flex: 1; border: none; background: transparent; font-size: 15px; outline: none; padding: 4px 0; color: var(--ios-text-main); width: 100%; }
        
        .star-select { background: #e5e5ea !important; padding: 6px 4px !important; border-radius: 6px; font-size: 13px !important; font-weight: 600; color: var(--ios-blue) !important;}
        
        .btn-add-cat { background: var(--ios-blue); color: white; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 18px; line-height: 1; cursor: pointer; margin-left: 10px; display: flex; justify-content: center; align-items: center; }
        .btn-primary { width: 100%; background-color: var(--ios-blue); color: white; border: none; padding: 16px; font-size: 17px; font-weight: 600; border-radius: 14px; cursor: pointer; transition: 0.1s; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-export { background: var(--ios-green); color: white; border: none; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .search-container { background: var(--ios-input-bg); border-radius: 10px; padding: 8px 12px; margin-bottom: 15px; display: flex; align-items: center; }
        .search-container input { border: none; background: transparent; width: 100%; font-size: 15px; outline: none; }

        .record-item { padding: 16px; border-bottom: 0.5px solid var(--ios-border); }
        .record-item:last-child { border-bottom: none; }
        .product-title { font-size: 17px; font-weight: 600; color: var(--ios-blue); margin-bottom: 4px; }
        .star-badge { color: var(--ios-orange); font-size: 14px; margin-left: 5px; }
        .data-row { display: flex; justify-content: space-between; font-size: 14px; margin-top: 4px; }
        .timestamp { font-size: 11px; color: var(--ios-text-muted); margin-top: 6px; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-edit { flex: 1; background: #fff0e0; color: var(--ios-orange); border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-destructive { flex: 1; background: #ffebe9; color: var(--ios-red); border: none; padding: 8px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .badge { background: var(--ios-blue); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .loading-text { text-align: center; padding: 20px; color: var(--ios-text-muted); font-size: 15px; }
    </style>
</head>
<body>

    <!-- Secure Login Screen -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>Savitri Electronics</h2>
            <p>Admin Secure Portal</p>
            <input type="email" id="emailInput" placeholder="Admin Email" autocomplete="email">
            <input type="password" id="passInput" placeholder="Password" autocomplete="current-password">
            <button class="btn-primary" onclick="loginUser()" id="loginBtn">Secure Login</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <div class="navbar">
            <div class="navbar-title">
                <h2>Savitri Electronics</h2>
                <p>Pro Finance Manager</p>
            </div>
            <!-- Logout Button -->
            <button class="btn-icon" onclick="logoutUser()" title="Secure Logout">🚪</button>
        </div>

        <div class="container">
            <div class="section-title">Product Entry</div>
            <div class="card" style="margin-top: 8px;">
                <input type="hidden" id="editId" value="">
                
                <div class="input-row">
                    <label>Brand</label>
                    <div class="input-wrapper">
                        <select id="categorySelect">
                            <option value="" disabled selected>Select Company...</option>
                        </select>
                        <button class="btn-add-cat" onclick="addNewCategory()">+</button>
                    </div>
                </div>

                <div class="input-row">
                    <label>Model No.</label>
                    <div class="input-wrapper" style="gap: 8px;">
                        <input type="text" id="modelNumber" placeholder="Enter Model No." style="flex: 2;">
                        <select id="starRating" class="star-select" style="flex: 1.1;">
                            <option value="" disabled selected>Rating</option>
                            <option value="1 Star">1 ⭐</option>
                            <option value="2 Star">2 ⭐</option>
                            <option value="3 Star">3 ⭐</option>
                            <option value="4 Star">4 ⭐</option>
                            <option value="5 Star">5 ⭐</option>
                            <option value="">No Star</option>
                        </select>
                    </div>
                </div>

                <div class="input-row">
                    <label>Serial No.</label>
                    <div class="input-wrapper">
                        <input type="text" id="serialNumber" placeholder="Enter Unique Serial No.">
                    </div>
                </div>
            </div>
            <button class="btn-primary" id="saveBtn">Save Record</button>

            <br><br>

            <div class="section-header">
                <div class="section-title">Available Stock <span class="badge" id="totalCount">0</span></div>
                <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
            </div>
            
            <div class="search-container">
                <span>🔍 </span>
                <input type="search" id="searchInput" placeholder="Search by Brand, Model or Serial..." onkeyup="filterRecords()">
            </div>

            <div class="card" id="recordsList">
                <div class="loading-text">Loading secure data...</div>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, orderBy, setDoc } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        // Authentication Import
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3hc6Rz1gHZq8c71AHp5NSw8eSZT2-Mik",
            authDomain: "savitri-job-bridge.firebaseapp.com",
            projectId: "savitri-job-bridge",
            storageBucket: "savitri-job-bridge.firebasestorage.app",
            messagingSenderId: "721066136910",
            appId: "1:721066136910:web:61b5d58b31d8ab481f7a1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // Auth initialize kiya

        let globalRecords = [];
        let brandCategories = ["LG", "WHIRLPOOL", "VOLTAS", "GODREJ", "BAJAJ", "SAMSUNG", "SONY", "HAVELLS"];
        let unsubscribeSync = null; // Sync rokne ke liye
        let unsubscribeBrands = null;

        // ================= SECURE AUTHENTICATION SYSTEM =================
        
        // Listen for Login/Logout state changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User logged in
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                startDatabaseSync(); // Data aana shuru
            } else {
                // User logged out
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
                if (unsubscribeSync) unsubscribeSync(); // Data aana band
                if (unsubscribeBrands) unsubscribeBrands();
            }
        });

        // Login Function
        window.loginUser = function() {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('loginBtn');
            
            if (!email || !pass) { alert("Email aur Password dono daalein."); return; }
            
            btn.innerText = "Verifying...";
            signInWithEmailAndPassword(auth, email, pass)
            .then(() => { btn.innerText = "Secure Login"; })
            .catch((error) => {
                alert("❌ Login Failed! Kripya sahi email aur password daalein.");
                btn.innerText = "Secure Login";
            });
        };

        // Logout Function
        window.logoutUser = function() {
            if(confirm("Secure Logout karna chahte hain?")) {
                signOut(auth).then(() => {
                    document.getElementById('emailInput').value = '';
                    document.getElementById('passInput').value = '';
                });
            }
        };

        // ================= DATABASE SYNC (Runs only when logged in) =================
        function startDatabaseSync() {
            const catRef = doc(db, "app_settings", "brands");
            unsubscribeBrands = onSnapshot(catRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().list) brandCategories = docSnap.data().list;
                else setDoc(catRef, { list: brandCategories });
                renderCategories();
            });

            const q = query(collection(db, "finance_records"), orderBy("timestamp", "desc"));
            unsubscribeSync = onSnapshot(q, (querySnapshot) => {
                const list = document.getElementById('recordsList');
                document.getElementById('totalCount').innerText = querySnapshot.size;
                list.innerHTML = ''; globalRecords = []; 
                if (querySnapshot.empty) { list.innerHTML = '<div class="loading-text">No records found.</div>'; return; }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data(); data.id = docSnap.id; globalRecords.push(data); 
                    
                    let displayName = data.category ? `${data.category} - ${data.model}` : (data.model || data.product);
                    let starDisplay = data.star ? `<span class="star-badge">(${data.star})</span>` : '';
                    let extraData = data.sr ? `<span style="font-size:12px; color:gray;">(Old SR: ${data.sr})</span>` : '';
                    let timeString = new Date(data.timestamp).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                    list.innerHTML += `
                        <div class="record-item record-card">
                            <div class="product-title">${displayName} ${starDisplay}</div>
                            <div class="data-row">
                                <span>S/N: <strong>${data.serial}</strong> ${extraData}</span>
                            </div>
                            <div class="timestamp">⏳ Added: ${timeString}</div>
                            <div class="action-buttons">
                                <button class="btn-edit" onclick="editRecord('${data.id}', '${data.category || ''}', '${data.model || ''}', '${data.star || ''}', '${data.serial}', '${data.product || ''}')">✏️ Edit</button>
                                <button class="btn-destructive" onclick="deleteRecord('${data.id}')">🗑️ Use</button>
                            </div>
                        </div>`;
                });
            }, (error) => {
                alert("Permission Error: Kripya Firebase rules check karein.");
            });
        }

        // ================= BRAND SYSTEM =================
        function renderCategories() {
            const select = document.getElementById("categorySelect");
            const currentVal = select.value;
            select.innerHTML = '<option value="" disabled selected>Select Company...</option>';
            brandCategories.sort().forEach(brand => {
                const opt = document.createElement("option"); opt.value = brand; opt.innerText = brand; select.appendChild(opt);
            });
            if(currentVal && brandCategories.includes(currentVal)) select.value = currentVal;
        }

        window.addNewCategory = async function() {
            const newBrand = prompt("Enter new Company/Brand name:");
            if (newBrand && newBrand.trim() !== "") {
                const cleanBrand = newBrand.trim().toUpperCase();
                if(!brandCategories.includes(cleanBrand)) {
                    brandCategories.push(cleanBrand);
                    await setDoc(doc(db, "app_settings", "brands"), { list: brandCategories });
                    document.getElementById("categorySelect").value = cleanBrand;
                } else alert("This brand already exists.");
            }
        };

        // ================= SAVE & EDIT =================
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const category = document.getElementById('categorySelect').value;
            const model = document.getElementById('modelNumber').value.trim().toUpperCase();
            const star = document.getElementById('starRating').value;
            const serial = document.getElementById('serialNumber').value.trim().toUpperCase();
            const editId = document.getElementById('editId').value;

            if (!category || !model || !serial) { alert("⚠️ Please fill Brand, Model and Serial No!"); return; }

            const isDuplicate = globalRecords.find(item => item.serial === serial && item.id !== editId);
            if (isDuplicate) { 
                alert(`❌ ERROR: Serial Number '${serial}' pehle se save hai! Ek Serial No. do baar save nahi ho sakta.`); 
                return; 
            }

            if (editId) {
                await updateDoc(doc(db, "finance_records", editId), { category, model, star, serial });
                document.getElementById('saveBtn').innerText = "Save Record";
                document.getElementById('saveBtn').style.backgroundColor = "var(--ios-blue)";
                document.getElementById('editId').value = '';
            } else { 
                addDoc(collection(db, "finance_records"), { category, model, star, serial, timestamp: Date.now() }); 
            }

            document.getElementById('categorySelect').value = ''; 
            document.getElementById('modelNumber').value = '';
            document.getElementById('starRating').value = ''; 
            document.getElementById('serialNumber').value = '';
        });

        window.editRecord = function(id, category, model, star, serial, oldProduct) {
            document.getElementById('categorySelect').value = category || ''; 
            document.getElementById('modelNumber').value = model || oldProduct || ''; 
            document.getElementById('starRating').value = star || '';
            document.getElementById('serialNumber').value = serial || '';
            document.getElementById('editId').value = id;
            const btn = document.getElementById('saveBtn'); 
            btn.innerText = "Update Record"; 
            btn.style.backgroundColor = "var(--ios-orange)"; 
            window.scrollTo(0, 0);
        };

        window.deleteRecord = function(id) { if (confirm("Mark as Used/Sold?")) deleteDoc(doc(db, "finance_records", id)); };

        // ================= EXPORT TO EXCEL =================
        window.exportExcel = function() {
            if(globalRecords.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Date,Brand,Model Name,Star Rating,Serial Number\n"; 
            globalRecords.forEach(row => {
                let dateStr = new Date(row.timestamp).toLocaleDateString('en-IN');
                csvContent += `"${dateStr}","${row.category || "N/A"}","${row.model || row.product || "N/A"}","${row.star || "N/A"}","${row.serial || row.sr || "N/A"}"\n`;
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `Savitri_Stock_${new Date().toLocaleDateString('en-IN')}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        // ================= SEARCH =================
        window.filterRecords = function() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('record-card');
            for (let i = 0; i < cards.length; i++) cards[i].style.display = cards[i].innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    </script>
</body>
</html>
