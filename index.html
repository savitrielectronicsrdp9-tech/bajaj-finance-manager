<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savitri Electronics | Finance Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1e3a8a; 
            --secondary: #3b82f6; 
            --background: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #ef4444;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--background); margin: 0; padding: 0; }
        .navbar { background-color: var(--primary); color: white; padding: 15px 20px; text-align: center; }
        .navbar h2 { margin: 0; font-size: 22px; }
        .navbar p { margin: 5px 0 0; font-size: 12px; color: #bfdbfe; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
        .card-header h3 { margin: 0; font-size: 18px; color: var(--primary); }
        .badge { background-color: var(--secondary); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-muted); }
        input { width: 100%; padding: 12px 15px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        button.save-btn { width: 100%; background-color: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .record-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px; }
        .product-title { font-size: 16px; font-weight: 600; }
        .sr-badge { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 14px; display: inline-block; }
        .serial-text { font-size: 13px; color: var(--text-muted); }
        .btn-use { background-color: white; color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; margin-top: 5px; }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px; }
        .error-msg { text-align: center; padding: 20px; color: white; background: var(--danger); border-radius: 8px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>SAVITRI ELECTRONICS</h2>
        <p>Finance Inventory Manager</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3>Add Fresh Product</h3>
            </div>
            <div class="input-group">
                <label>Product Details (e.g. LED TV 43")</label>
                <input type="text" id="productName" placeholder="Enter product name..." required>
            </div>
            <div class="input-group">
                <label>Bajaj SR Number</label>
                <input type="text" id="srNumber" placeholder="Enter SR number..." required>
            </div>
            <div class="input-group">
                <label>Serial Number (S/N)</label>
                <input type="text" id="serialNumber" placeholder="Enter product serial number..." required>
            </div>
            <button class="save-btn" id="saveBtn">Save to Database</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Available Stock</h3>
                <span class="badge" id="totalCount">0 Items</span>
            </div>
            
            <div class="input-group">
                <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by Model or SR Number..." onkeyup="filterRecords()">
            </div>

            <div id="recordsList">
                <div class="loading">Loading database...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMxOAPhpgdwIsBB3RQSnitsOqp6njW4cc",
            authDomain: "bajaj-finance-aap.firebaseapp.com",
            projectId: "bajaj-finance-aap",
            storageBucket: "bajaj-finance-aap.firebasestorage.app",
            messagingSenderId: "147678015396",
            appId: "1:147678015396:web:f04e504de17b3bab22db31",
            measurementId: "G-Z6VVGN318K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Data Save Karne Ka Code (With Error Alert)
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const product = document.getElementById('productName').value;
            const sr = document.getElementById('srNumber').value;
            const serial = document.getElementById('serialNumber').value;
            const btn = document.getElementById('saveBtn');

            if (product && sr && serial) {
                btn.innerText = "Saving...";
                try {
                    await addDoc(collection(db, "finance_records"), {
                        product: product.toUpperCase(),
                        sr: sr.toUpperCase(),
                        serial: serial.toUpperCase(),
                        timestamp: serverTimestamp()
                    });
                    document.getElementById('productName').value = '';
                    document.getElementById('srNumber').value = '';
                    document.getElementById('serialNumber').value = '';
                } catch (e) {
                    alert("⚠️ Save Error: " + e.message);
                }
                btn.innerText = "Save to Database";
            } else {
                alert("Please fill all details!");
            }
        });

        window.deleteRecord = async function(id) {
            if (confirm("Are you sure this item is used/sold?")) {
                await deleteDoc(doc(db, "finance_records", id));
            }
        };

        // Real-time Data Sync (With Error Display on Screen)
        const q = query(collection(db, "finance_records"), orderBy("timestamp", "desc"));
        onSnapshot(q, (querySnapshot) => {
            const list = document.getElementById('recordsList');
            document.getElementById('totalCount').innerText = querySnapshot.size + " Items";
            list.innerHTML = '';
            
            if (querySnapshot.empty) {
                list.innerHTML = '<div class="loading">No records found. Add a new product above.</div>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="record-item record-card">
                        <div class="product-title">${data.product}</div>
                        <div><span class="sr-badge">SR: ${data.sr}</span></div>
                        <div class="serial-text">S/N: ${data.serial}</div>
                        <button class="btn-use" onclick="deleteRecord('${doc.id}')">Use & Delete Item</button>
                    </div>
                `;
            });
        }, (error) => {
            // AGAR KOI ERROR AAYA TOH SCREEN PAR LAL RANG MEIN DIKHEGA
            document.getElementById('recordsList').innerHTML = `<div class="error-msg">⚠️ Connection Error: ${error.message}</div>`;
        });

        window.filterRecords = function() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('record-card');
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toUpperCase();
                cards[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
